name: Deploy Account B (Worker)

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout Repo
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # 2. Setup Terraform (READ STATE)
      # -------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init (read state)
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -backend-config="region=us-east-1"

      # -------------------------
      # 3. Install jq
      # -------------------------
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # -------------------------
      # 4. Get EC2 Public IP (Account B)
      # -------------------------
      - name: Get EC2 Public IP
        working-directory: terraform
        run: |
          IP=$(terraform output -json | jq -r '.account_b.value.worker_public_ip')
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      # -------------------------
      # 5. Setup SSH Private Key
      # -------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" | sed 's/\\n/\n/g' > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem
          chmod 700 ~/.ssh

      # -------------------------
      # 6. Generate Ansible Inventory
      # -------------------------
      - name: Generate Inventory
        run: |
          echo "[app_B]" > ansible/inventory.ini
          echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=~/.ssh/key.pem" >> ansible/inventory.ini

      # -------------------------
      # 7. Install Ansible
      # -------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # -------------------------
      # 8. Wait for EC2
      # -------------------------
      - name: Wait for EC2 to be ready
        run: |
          echo "Waiting for EC2 to be ready..."
          sleep 60

      # -------------------------
      # 9. Run Ansible (Account B)
      # -------------------------
      - name: Run Ansible
        working-directory: ansible
        run: |
          ansible-playbook deploy_B.yml
