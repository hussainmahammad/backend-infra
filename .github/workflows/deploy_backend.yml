name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout Repo
        uses: actions/checkout@v3

      # -------------------------
      # 2. AWS Login
      # -------------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_A_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_A_SECRET_KEY }}
          aws-region: us-east-1

      # -------------------------
      # 3. Terraform Init (read output)
      # -------------------------
      - name: Terraform Init
        run: terraform init

      # -------------------------
      # 4. Get EC2 IP
      # -------------------------
      - name: Get EC2 Public IP
        run: |
          IP=$(terraform output -raw app_server_ip)
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      # -------------------------
      # 5. Setup SSH key
      # -------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      # -------------------------
      # 6. Generate Ansible Inventory
      # -------------------------
      - name: Generate Inventory
        run: |
          echo "[app]" > ../ansible/inventory.ini
          echo "$EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/key.pem" >> ../ansible/inventory.ini

      # -------------------------
      # 7. Install Ansible
      # -------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # -------------------------
      # 8. Run Deploy
      # -------------------------
      - name: Run Ansible Deploy
        working-directory: ansible
        run: |
          ansible-playbook deploy.yml
