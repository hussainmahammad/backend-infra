name: Deploy Backend

on:
  workflow_dispatch:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: terraform

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout Repo
        uses: actions/checkout@v3

      # -------------------------
      # 2. AWS Login
      # -------------------------
      - name: Configure AWS
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_A_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_A_SECRET_KEY }}
          aws-region: us-east-1

      # -------------------------
      # 3. Terraform Init (read output)
      # -------------------------
      - name: Terraform Init
        run: terraform init

      # -------------------------
      # 4. Install jq (needed for parsing)
      # -------------------------
      - name: Install jq
        run: sudo apt-get install -y jq

      # -------------------------
      # 5. Get EC2 IP (FIXED)
      # -------------------------
      - name: Get EC2 Public IP
        run: |
          IP=$(terraform output -json | jq -r '.account_a.value.jenkins_public_ip')
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      # -------------------------
      # 6. Setup SSH key
      # -------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      # -------------------------
      # 7. Generate Ansible Inventory
      # -------------------------
      - name: Generate Inventory
        run: |
          echo "[app]" > ../ansible/inventory.ini
          echo "$EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/key.pem" >> ../ansible/inventory.ini

      # -------------------------
      # 8. Install Ansible
      # -------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # -------------------------
      # 9. Run Deploy
      # -------------------------
      - name: Run Ansible Deploy
        working-directory: ansible
        run: |
          ansible-playbook deploy.yml
