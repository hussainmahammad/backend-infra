name: Deploy Backend Infra

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔍 DEBUG: Check backend account (Account B)
      - name: Check AWS identity (backend creds)
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_B_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_B_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: aws sts get-caller-identity

      # ✅ Terraform Init (uses Account B → S3 backend)
      - name: Terraform Init
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_B_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_B_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform init

      # ✅ Terraform Apply (uses Account A → infra creation)
      - name: Terraform Apply
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_A_ACCESS_KEY }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_A_SECRET_KEY }}
          AWS_DEFAULT_REGION: us-east-1
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var="aws_a_access_key=${{ secrets.AWS_A_ACCESS_KEY }}" \
            -var="aws_a_secret_key=${{ secrets.AWS_A_SECRET_KEY }}" \
            -var="aws_b_access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -var="aws_b_secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -var="aws_c_access_key=${{ secrets.AWS_C_ACCESS_KEY }}" \
            -var="aws_c_secret_key=${{ secrets.AWS_C_SECRET_KEY }}" \
            -var="public_key=${{ secrets.PUBLIC_KEY }}"
