name: Deploy Backend Infra

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # 🔥 FORCE AWS SESSION (Account B)
      - name: Configure AWS Credentials (Account B)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_B_ACCESS_KEY }}
          aws-secret-access-key: ${{ secrets.AWS_B_SECRET_KEY }}
          aws-region: us-east-1

      # 🔍 Debug (confirm account)
      - name: Check AWS identity
        run: aws sts get-caller-identity

      # ✅ Terraform (same creds, same session)
      - name: Terraform Init & Apply
        run: |
          cd terraform
          terraform init
          terraform apply -auto-approve
