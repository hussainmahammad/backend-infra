name: Deploy Backend Infra

on:
  workflow_dispatch:

jobs:
  terraform:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # STEP 1: Use Account B creds for S3 backend
      - name: Set AWS creds for backend (Account B)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_B_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_B_SECRET_KEY }}" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      # 🔍 DEBUG: Check which account these creds belong to
      - name: Check AWS identity (backend creds)
        run: aws sts get-caller-identity

      - name: Terraform Init
        run: |
          cd terraform
          terraform init

      # STEP 2: Switch to Account A creds for infra creation
      - name: Set AWS creds for infra (Account A)
        run: |
          echo "AWS_ACCESS_KEY_ID=${{ secrets.AWS_A_ACCESS_KEY }}" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=${{ secrets.AWS_A_SECRET_KEY }}" >> $GITHUB_ENV

      - name: Terraform Apply
        run: |
          cd terraform
          terraform apply -auto-approve \
            -var="aws_a_access_key=${{ secrets.AWS_A_ACCESS_KEY }}" \
            -var="aws_a_secret_key=${{ secrets.AWS_A_SECRET_KEY }}" \
            -var="aws_b_access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -var="aws_b_secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -var="aws_c_access_key=${{ secrets.AWS_C_ACCESS_KEY }}" \
            -var="aws_c_secret_key=${{ secrets.AWS_C_SECRET_KEY }}" \
            -var="public_key=${{ secrets.PUBLIC_KEY }}"
