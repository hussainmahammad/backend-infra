name: Deploy Backend Infra

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # -------------------------
      # 1. Checkout
      # -------------------------
      - name: Checkout Code
        uses: actions/checkout@v4

      # -------------------------
      # 2. Setup Terraform
      # -------------------------
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      # -------------------------
      # 3. Terraform Init
      # -------------------------
      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -backend-config="region=us-east-1"

      # -------------------------
      # 4. Terraform Apply
      # -------------------------
      - name: Terraform Apply
        working-directory: terraform
        run: |
          terraform apply -auto-approve \
            -var="aws_a_access_key=${{ secrets.AWS_A_ACCESS_KEY }}" \
            -var="aws_a_secret_key=${{ secrets.AWS_A_SECRET_KEY }}" \
            -var="aws_b_access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -var="aws_b_secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -var="aws_c_access_key=${{ secrets.AWS_C_ACCESS_KEY }}" \
            -var="aws_c_secret_key=${{ secrets.AWS_C_SECRET_KEY }}" \
            -var="public_key=${{ secrets.PUBLIC_KEY }}"

      # -------------------------
      # 5. Install jq
      # -------------------------
      - name: Install jq
        run: sudo apt-get install -y jq

      # -------------------------
      # 6. Get EC2 Public IP
      # -------------------------
      - name: Get EC2 Public IP
        working-directory: terraform
        run: |
          IP=$(terraform output -json | jq -r '.account_a.value.jenkins_public_ip')
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      # -------------------------
      # 7. Setup SSH Key
      # -------------------------
      - name: Setup SSH Key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PRIVATE_KEY }}" > ~/.ssh/key.pem
          chmod 600 ~/.ssh/key.pem

      # -------------------------
      # 8. Generate Inventory (FIXED app_A)
      # -------------------------
      - name: Generate Inventory
        run: |
          echo "[app_A]" > ansible/inventory.ini
          echo "$EC2_IP ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/key.pem" >> ansible/inventory.ini

      # -------------------------
      # 9. Install Ansible
      # -------------------------
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # -------------------------
      # 10. Pull Git LFS (CRITICAL)
      # -------------------------
      - name: Pull Git LFS Files
        run: |
          git lfs install
          git lfs pull

      # -------------------------
      # 11. Run Ansible
      # -------------------------
      - name: Run Ansible Deploy
        working-directory: ansible
        run: |
          ansible-playbook deploy.yml
