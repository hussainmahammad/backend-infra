- name: Create base directory
  file:
    path: "{{ app_dir }}"
    state: directory
    owner: ec2-user
    group: ec2-user

- name: Clone or update repo
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ branch }}"
    force: yes

# 🔥 IMPORTANT: run inside backend folder
- name: Install dependencies
  npm:
    path: "{{ backend_path }}"

- name: Restart app with PM2
  shell: |
    pm2 delete {{ app_name }} || true
    cd {{ backend_path }}
    pm2 start {{ start_file }} --name {{ app_name }}
    pm2 save
