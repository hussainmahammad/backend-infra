- name: Remove entire /opt directory
  file:
    path: /opt
    state: absent

- name: Recreate /opt directory
  file:
    path: /opt
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Clone repo into /opt
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ branch }}"
    force: yes
  become: true
  become_user: ec2-user   # ✅ FIX

# 🔥🔥🔥 CRITICAL FIX (THIS WAS MISSING)
- name: Update ACCOUNT_C_ROLE_ARN in .env
  lineinfile:
    path: "{{ backend_path }}/.env"
    regexp: '^ACCOUNT_C_ROLE_ARN='
    line: "ACCOUNT_C_ROLE_ARN={{ account_c_role_arn }}"
    create: yes
    owner: ec2-user
    group: ec2-user
    mode: '0644'

# 🔥 Install dependencies
- name: Install dependencies
  npm:
    path: "{{ backend_path }}"
  become: true
  become_user: ec2-user   # ✅ FIX

# 🔥 Enable PM2 startup (AUTO START AFTER REBOOT)
- name: Enable PM2 startup on boot
  shell: |
    pm2 startup systemd -u ec2-user --hp /home/ec2-user
  become: true   # ✅ MUST stay root

# 🔥 Start backend properly
- name: Start backend with PM2 (robust)
  shell: |
    cd {{ backend_path }}

    echo "Installing dependencies..."
    npm install

    echo "Starting backend..."
    pm2 delete {{ app_name }} || true
    pm2 start {{ start_file }} --name {{ app_name }} --update-env || exit 1

    echo "Waiting for app..."
    sleep 5

    pm2 status

    echo "Saving PM2 process list..."
    pm2 save
  become: true
  become_user: ec2-user   # ✅ FIX
