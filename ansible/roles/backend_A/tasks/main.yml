- name: Remove entire /opt directory
  file:
    path: /opt
    state: absent

- name: Recreate /opt directory
  file:
    path: /opt
    state: directory
    owner: ec2-user
    group: ec2-user
    mode: '0755'

- name: Clone repo into /opt
  git:
    repo: "{{ repo_url }}"
    dest: "{{ app_dir }}"
    version: "{{ branch }}"
    force: yes

# 🔥 IMPORTANT: run inside backend folder
- name: Install dependencies
  npm:
    path: "{{ backend_path }}"

# 🔥 FIXED PM2 STEP (ONLY CHANGE)
- name: Start backend with PM2 (robust)
  shell: |
    cd {{ backend_path }}

    echo "Installing dependencies..."
    npm install

    echo "Starting backend..."
    pm2 delete {{ app_name }} || true
    pm2 start {{ start_file }} --name {{ app_name }} || exit 1

    echo "Waiting for app..."
    sleep 5

    pm2 status
    pm2 save
