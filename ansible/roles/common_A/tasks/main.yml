- name: Install base packages
  apt:
    name:
      - git
      - curl
      - unzip
    update_cache: yes

- name: Install Node.js 18
  shell: |
    curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    apt install -y nodejs
  args:
    executable: /bin/bash

- name: Install PM2 globally
  npm:
    name: pm2
    global: yes

- name: Install Java 21
  apt:
    name: openjdk-21-jdk
    state: present
