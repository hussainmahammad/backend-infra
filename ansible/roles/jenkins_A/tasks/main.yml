- name: Install Jenkins repo
  shell: |
    wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
    rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
  args:
    executable: /bin/bash

- name: Install Jenkins
  yum:
    name: jenkins
    state: present

- name: Stop Jenkins
  service:
    name: jenkins
    state: stopped

- name: Remove old Jenkins
  file:
    path: /var/lib/jenkins
    state: absent

# DOWNLOAD BACKUP
- name: Download Jenkins backup
  get_url:
    url: https://github.com/hussainmahammad/backend-infra/releases/download/v1.0/jenkins-full-backup.tar.gz
    dest: /tmp/jenkins.tar.gz

# RESTORE BACKUP
- name: Restore backup
  unarchive:
    src: /tmp/jenkins.tar.gz
    dest: /var/lib/
    remote_src: yes

# SSH SETUP
- name: Create .ssh directory
  file:
    path: /var/lib/jenkins/.ssh
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0700'

- name: Copy private key
  copy:
    dest: /var/lib/jenkins/.ssh/id_rsa
    content: "{{ private_key }}"
    owner: jenkins
    group: jenkins
    mode: '0600'

- name: Add worker to known_hosts
  shell: |
    ssh-keyscan -H {{ worker_private_ip }} >> /var/lib/jenkins/.ssh/known_hosts
  become: true
  become_user: jenkins
  ignore_errors: yes

# FIX PERMISSIONS
- name: Fix permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

# START JENKINS
- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

# WAIT FOR JENKINS
- name: Wait for Jenkins
  uri:
    url: http://localhost:8080/login
    status_code: 200
  register: result
  retries: 20
  delay: 10
  until: result.status == 200

# 🔥 CREATE NODE VIA GROOVY (REAL FIX)
- name: Create node properly via Jenkins API
  shell: |
    cat <<EOF > /tmp/node.groovy
    import jenkins.model.*
    import hudson.slaves.*
    import hudson.plugins.sshslaves.*

    def j = Jenkins.instance

    // remove old node if exists
    def n = j.getNode("agent-b")
    if (n != null) {
        j.removeNode(n)
    }

    def launcher = new SSHLauncher(
        "{{ worker_private_ip }}",
        22,
        null,
        null,
        null,
        null,
        null,
        null,
        60,
        10,
        15,
        new NonVerifyingKeyVerificationStrategy(),
        false,
        false,
        null,
        null,
        null
    )

    def node = new DumbSlave(
        "agent-b",
        "agent-b",
        "/home/jenkins",
        "2",
        Node.Mode.NORMAL,
        "",
        launcher,
        new RetentionStrategy.Always(),
        new LinkedList()
    )

    j.addNode(node)
    j.save()
    EOF

    curl -X POST http://localhost:8080/scriptText \
      --data-urlencode "script=$(cat /tmp/node.groovy)"

# FINAL RESTART
- name: Restart Jenkins
  service:
    name: jenkins
    state: restarted
