- name: Install Jenkins repo
  shell: |
    wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
    rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
  args:
    executable: /bin/bash

- name: Install Jenkins
  yum:
    name: jenkins
    state: present

- name: Stop Jenkins
  service:
    name: jenkins
    state: stopped

- name: Remove old Jenkins
  file:
    path: /var/lib/jenkins
    state: absent

# ✅ DOWNLOAD FROM GITHUB RELEASE
- name: Download Jenkins backup
  get_url:
    url: https://github.com/hussainmahammad/backend-infra/releases/download/v1.0/jenkins-full-backup.tar.gz
    dest: /tmp/jenkins.tar.gz

# ✅ RESTORE BACKUP
- name: Restore backup
  unarchive:
    src: /tmp/jenkins.tar.gz
    dest: /var/lib/
    remote_src: yes

# 🔥 FIX WORKER NODE IP
- name: Update worker IP in Jenkins node config
  replace:
    path: /var/lib/jenkins/nodes/agent-b/config.xml
    regexp: '<host>.*</host>'
    replace: '<host>{{ worker_private_ip }}</host>'

# ✅ FIX PERMISSIONS BEFORE START
- name: Fix permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

# 🔥 START JENKINS
- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

# 🔥 WAIT FOR JENKINS
- name: Wait for Jenkins to be ready
  uri:
    url: http://localhost:8080/login
    status_code: 200
  register: result
  retries: 20
  delay: 10
  until: result.status == 200

# 🔥 WRITE PRIVATE KEY CLEANLY
- name: Save private key
  copy:
    dest: /var/lib/jenkins/key.pem
    content: "{{ private_key }}"
    owner: jenkins
    group: jenkins
    mode: '0600'

# 🔥 CREATE GROOVY SCRIPT (REAL FIX)
- name: Create Jenkins credential script
  copy:
    dest: /var/lib/jenkins/update-cred.groovy
    content: |
      import jenkins.model.*
      import com.cloudbees.plugins.credentials.*
      import com.cloudbees.plugins.credentials.domains.*
      import com.cloudbees.plugins.credentials.impl.*
      import com.cloudbees.jenkins.plugins.sshcredentials.impl.*

      def instance = Jenkins.instance
      def domain = Domain.global()

      def store = instance.getExtensionList(
        'com.cloudbees.plugins.credentials.SystemCredentialsProvider'
      )[0].getStore()

      def id = "agent-b-ssh-key"

      def existing = store.getCredentials(domain).find { it.id == id }
      if (existing != null) {
          store.removeCredentials(domain, existing)
      }

      def key = new File("/var/lib/jenkins/key.pem").text

      def newCred = new BasicSSHUserPrivateKey(
          CredentialsScope.GLOBAL,
          id,
          "ec2-user",
          new BasicSSHUserPrivateKey.DirectEntryPrivateKeySource(key),
          "",
          "updated"
      )

      store.addCredentials(domain, newCred)
      instance.save()

# 🔥 EXECUTE GROOVY SCRIPT
- name: Run Groovy script
  shell: |
    curl -X POST http://localhost:8080/scriptText \
      --data-urlencode "script=$(cat /var/lib/jenkins/update-cred.groovy)"

# 🔥 RESTART JENKINS
- name: Restart Jenkins
  service:
    name: jenkins
    state: restarted
