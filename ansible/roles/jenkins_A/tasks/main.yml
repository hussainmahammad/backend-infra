- name: Install Jenkins repo
  shell: |
    wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
    rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
  args:
    executable: /bin/bash

- name: Install Jenkins
  yum:
    name: jenkins
    state: present

- name: Stop Jenkins
  service:
    name: jenkins
    state: stopped

- name: Remove old Jenkins
  file:
    path: /var/lib/jenkins
    state: absent

# 🔥 Backup copy (correct path)
- name: Copy Jenkins backup
  copy:
    src: "{{ playbook_dir }}/../jenkins/jenkins-full-backup.tar.gz"
    dest: /tmp/jenkins.tar.gz

- name: Restore backup
  unarchive:
    src: /tmp/jenkins.tar.gz
    dest: /var/lib/
    remote_src: yes

- name: Fix permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes
