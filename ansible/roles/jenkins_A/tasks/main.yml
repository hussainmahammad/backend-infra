- name: Install Jenkins repo
  shell: |
    wget -O /etc/yum.repos.d/jenkins.repo https://pkg.jenkins.io/redhat-stable/jenkins.repo
    rpm --import https://pkg.jenkins.io/redhat-stable/jenkins.io-2023.key
  args:
    executable: /bin/bash

- name: Install Jenkins
  yum:
    name: jenkins
    state: present

- name: Stop Jenkins
  service:
    name: jenkins
    state: stopped

- name: Remove old Jenkins
  file:
    path: /var/lib/jenkins
    state: absent

# ✅ DOWNLOAD BACKUP
- name: Download Jenkins backup
  get_url:
    url: https://github.com/hussainmahammad/backend-infra/releases/download/v1.0/jenkins-full-backup.tar.gz
    dest: /tmp/jenkins.tar.gz

# ✅ RESTORE BACKUP
- name: Restore backup
  unarchive:
    src: /tmp/jenkins.tar.gz
    dest: /var/lib/
    remote_src: yes

# 🔥 DELETE OLD NODE (CRITICAL FIX)
- name: Remove old node completely
  file:
    path: /var/lib/jenkins/nodes/agent-b
    state: absent

# 🔥 CREATE NODE DIRECTORY
- name: Create node directory
  file:
    path: /var/lib/jenkins/nodes/agent-b
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0755'

# 🔥 CREATE .ssh DIRECTORY
- name: Create Jenkins .ssh directory
  file:
    path: /var/lib/jenkins/.ssh
    state: directory
    owner: jenkins
    group: jenkins
    mode: '0700'

# 🔥 COPY PRIVATE KEY
- name: Copy private key for Jenkins SSH
  copy:
    dest: /var/lib/jenkins/.ssh/id_rsa
    content: "{{ private_key }}"
    owner: jenkins
    group: jenkins
    mode: '0600'

# 🔥 ADD KNOWN HOST
- name: Add worker to known_hosts
  shell: |
    ssh-keyscan -H {{ worker_private_ip }} >> /var/lib/jenkins/.ssh/known_hosts
  become: true
  become_user: jenkins
  ignore_errors: yes

# 🔥 CREATE CLEAN NODE CONFIG (NO credentialsId)
- name: Replace node config completely
  copy:
    dest: /var/lib/jenkins/nodes/agent-b/config.xml
    owner: jenkins
    group: jenkins
    mode: '0644'
    content: |
      <slave>
        <name>agent-b</name>
        <description></description>
        <remoteFS>/home/jenkins</remoteFS>
        <numExecutors>2</numExecutors>
        <mode>NORMAL</mode>
        <retentionStrategy class="hudson.slaves.RetentionStrategy$Always"/>
        <launcher class="hudson.plugins.sshslaves.SSHLauncher">
          <host>{{ worker_private_ip }}</host>
          <port>22</port>
          <credentialsId></credentialsId>
          <sshHostKeyVerificationStrategy class="hudson.plugins.sshslaves.verifiers.NonVerifyingKeyVerificationStrategy"/>
        </launcher>
        <label></label>
        <nodeProperties/>
      </slave>

# 🔥 FIX PERMISSIONS
- name: Fix permissions
  file:
    path: /var/lib/jenkins
    owner: jenkins
    group: jenkins
    recurse: yes

# 🔥 START JENKINS
- name: Start Jenkins
  service:
    name: jenkins
    state: started
    enabled: yes

# 🔥 WAIT FOR JENKINS
- name: Wait for Jenkins to be ready
  uri:
    url: http://localhost:8080/login
    status_code: 200
  register: result
  retries: 20
  delay: 10
  until: result.status == 200

# 🔥 FORCE RELOAD (IMPORTANT)
- name: Reload Jenkins config
  shell: |
    curl -X POST http://localhost:8080/reload

# 🔥 FINAL RESTART
- name: Restart Jenkins
  service:
    name: jenkins
    state: restarted
