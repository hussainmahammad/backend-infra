name: Deploy Account A

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Terraform
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        working-directory: terraform
        run: |
          terraform init \
            -backend-config="access_key=${{ secrets.AWS_B_ACCESS_KEY }}" \
            -backend-config="secret_key=${{ secrets.AWS_B_SECRET_KEY }}" \
            -backend-config="region=us-east-1"

      # 3. Install jq
      - name: Install jq
        run: sudo apt-get update && sudo apt-get install -y jq

      # 4. Get Jenkins Public IP
      - name: Get EC2 Public IP
        working-directory: terraform
        run: |
          IP=$(terraform output -json | jq -r '.account_a.value.jenkins_public_ip')
          echo "EC2_IP=$IP" >> $GITHUB_ENV

      # 5. Get Worker Private IP
      - name: Get Worker Private IP
        working-directory: terraform
        run: |
          WIP=$(terraform output -json | jq -r '.account_b.value.agent_private_ip')
          echo "WORKER_IP=$WIP" >> $GITHUB_ENV

      # 🔥 FIXED SSH STEP
      - name: Setup SSH Key
        shell: bash
        run: |
          set -euxo pipefail

          mkdir -p "$HOME/.ssh"

          printf "%s\n" "${{ secrets.PRIVATE_KEY }}" > "$HOME/.ssh/key.pem"

          chmod 700 "$HOME/.ssh"
          chmod 600 "$HOME/.ssh/key.pem"

          ssh-keyscan -H "$EC2_IP" >> "$HOME/.ssh/known_hosts"

      # 7. Inventory
      - name: Generate Inventory
        run: |
          echo "[app_A]" > ansible/inventory.ini
          echo "$EC2_IP ansible_user=ec2-user ansible_ssh_private_key_file=$HOME/.ssh/key.pem" >> ansible/inventory.ini

          echo "" >> ansible/inventory.ini
          echo "[all:vars]" >> ansible/inventory.ini
          echo "worker_private_ip=$WORKER_IP" >> ansible/inventory.ini

      # 8. Install Ansible
      - name: Install Ansible
        run: |
          sudo apt update
          sudo apt install -y ansible

      # 9. Pull LFS
      - name: Pull Git LFS
        run: |
          git lfs install
          git lfs pull

      # 10. Wait
      - name: Wait for EC2
        run: sleep 60

      # 11. Run Ansible
      - name: Run Ansible
        run: |
          ansible-playbook -i ansible/inventory.ini ansible/deploy_A.yml \
          -e "private_key=${{ secrets.PRIVATE_KEY }}"
